<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reel Player</title>
  <meta name="description" content="Paste an Instagram Reel link and play it in a simple, mobile-friendly viewer." />
  <meta property="og:title" content="Reel Player" />
  <meta property="og:description" content="Paste an Instagram Reel link and share a clean mobile-friendly reel viewer." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1200&q=80" />
  <meta property="og:image:alt" content="Reel Player preview" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Reel Player" />
  <meta name="twitter:description" content="Paste an Instagram Reel link and share a clean mobile-friendly reel viewer." />
  <meta name="twitter:image" content="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=1200&q=80" />
  <style>
    :root {
      --bg: #0b0f17;
      --card: rgba(255,255,255,0.08);
      --card-border: rgba(255,255,255,0.12);
      --text: #f5f7fb;
      --muted: #aab3c5;
      --accent: #7c5cff;
      --accent-2: #22c55e;
      --danger: #ef4444;
      --shadow: 0 20px 60px rgba(0,0,0,0.45);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(124,92,255,0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(34,197,94,0.12), transparent 24%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .shell {
      width: min(100%, 980px);
      display: grid;
      gap: 16px;
    }

    .hero {
      display: grid;
      gap: 10px;
      padding: 8px 4px;
    }

    .title {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.5rem);
      letter-spacing: -0.04em;
      line-height: 1.02;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.5;
      max-width: 62ch;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .controls {
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
    }

    .viewerActions {
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .sharePreview {
      display: grid;
      gap: 6px;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .sharePreview strong {
      font-size: 0.98rem;
      color: var(--text);
    }

    .sharePreview span {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .viewerActions .actions {
      justify-content: flex-start;
    }

    @media (max-width: 720px) {
      .row { grid-template-columns: 1fr; }
      .actions { justify-content: stretch; }
      .actions button { width: 100%; }
      .viewerActions .actions button { width: 100%; }
    }

    input {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 1rem;
      outline: none;
    }

    input::placeholder { color: #8892a8; }

    button, .linkbtn {
      border: 0;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, opacity .15s ease, background .15s ease;
      white-space: nowrap;
    }

    button:hover, .linkbtn:hover { transform: translateY(-1px); }
    button:active, .linkbtn:active { transform: translateY(0); }

    .primary { background: linear-gradient(135deg, var(--accent), #9f7bff); color: white; }
    .secondary { background: rgba(255,255,255,0.08); color: var(--text); border: 1px solid rgba(255,255,255,0.12); }
    .success { background: rgba(34,197,94,0.14); color: #c9ffd7; border: 1px solid rgba(34,197,94,0.25); }

    .note {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .viewer {
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
    }

    .frameWrap {
      width: 100%;
      aspect-ratio: 9 / 16;
      background: #f7f9fc;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #f7f9fc;
    }

    .empty {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 20px;
      color: #65708a;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.65), rgba(255,255,255,0.35)),
        #f1f4f9;
    }

    .empty strong { color: #1c2433; display: block; margin-bottom: 8px; }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      padding: 0 4px 2px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    code {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
      padding: 2px 6px;
      border-radius: 8px;
      color: #d8def0;
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1 class="title">Reel Player</h1>
      <p class="subtitle">
        Paste an Instagram Reel link, load it, and share this page with the reel link in the URL.
        Works nicely on phone and desktop.
      </p>
    </section>

    <section class="card viewer">
      <div class="frameWrap" id="frameWrap">
        <div class="empty" id="emptyState">
          <div>
            <strong>No reel loaded yet</strong>
            Paste a reel link above and hit <b>Open Reel</b>.
          </div>
        </div>
        <iframe id="player" title="Instagram Reel Player" allowfullscreen loading="lazy" style="display:none;"></iframe>
      </div>
    </section>

    <section class="card viewerActions" id="viewerActions">
      <div class="row">
        <input id="reelInput" type="url" placeholder="https://www.instagram.com/reel/..." autocomplete="off" />
        <button class="primary" id="loadBtn">Open Reel</button>
      </div>
      <div class="actions" id="copyActionWrap">
        <button class="secondary" id="copyBtn">Copy Share Link</button>
      </div>
      <div class="note" id="status">
        Tip: you can also open this page with <code>?reel=YOUR_INSTAGRAM_REEL_URL</code> in the address bar.
      </div>
    </section>

  
  </main>

  <script>
    const input = document.getElementById('reelInput');
    const loadBtn = document.getElementById('loadBtn');
    const copyBtn = document.getElementById('copyBtn');
    const viewerActions = document.getElementById('viewerActions');
    const statusEl = document.getElementById('status');
    const iframe = document.getElementById('player');
    const emptyState = document.getElementById('emptyState');

    function normalizeInstagramReelUrl(url) {
      const trimmed = (url || '').trim();
      if (!trimmed) return '';

      try {
        const u = new URL(trimmed);
        const host = u.hostname.replace(/^www\./, '');

        if (host.includes('instagram.com')) {
          // Keep the reel URL and swap to /embed/ for a simple viewer.
          let path = u.pathname.replace(/\/+$/, '');
          if (path.endsWith('/embed')) return u.toString();
          if (!path.endsWith('/')) path += '/';
          return `${u.origin}${path}embed/`;
        }

        return trimmed;
      } catch {
        return trimmed;
      }
    }

    function setPlayer(url) {
      const embedUrl = normalizeInstagramReelUrl(url);
      if (!embedUrl) {
        iframe.style.display = 'none';
        emptyState.style.display = 'grid';
        statusEl.textContent = 'Paste a reel link first.';
        return;
      }

      iframe.src = embedUrl;
      iframe.style.display = 'block';
      emptyState.style.display = 'none';
      statusEl.textContent = 'Loaded reel. If it does not show, the reel may not allow embedding.';
      const params = new URLSearchParams(location.search);
      params.set('reel', url);
      history.replaceState(null, '', `${location.pathname}?${params.toString()}`);
    }

    function getCurrentReelFromUrl() {
      const params = new URLSearchParams(location.search);
      return params.get('reel') || '';
    }

    async function copyShareLink() {
      const reel = input.value.trim() || getCurrentReelFromUrl();
      if (!reel) {
        statusEl.textContent = 'Nothing to copy yet.';
        return;
      }
      const shareUrl = `${location.origin}${location.pathname}?reel=${encodeURIComponent(reel)}`;
      try {
        await navigator.clipboard.writeText(shareUrl);
        statusEl.textContent = 'Share link copied!';
      } catch {
        prompt('Copy this share link:', shareUrl);
      }
    }

    loadBtn.addEventListener('click', () => setPlayer(input.value));
    copyBtn.addEventListener('click', copyShareLink);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') setPlayer(input.value);
    });

    const initialReel = getCurrentReelFromUrl();
    if (initialReel) {
      input.value = initialReel;
      setPlayer(initialReel);
    }
  </script>
</body>
</html>
